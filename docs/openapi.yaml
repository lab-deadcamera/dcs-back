openapi: "3.0.3"
info:
  title: DCS Back API
  description: |
    Backend for Dead Camera Studios. Three subsystems:
    
    **1. Images** — filesystem-based image upload/serve/delete (legacy).
    **2. Studio** — BytePlus ModelArk client (Seedance video, Seedream image, Assets API).
    **3. Files + Characters** — DB-backed file management (images, videos, audio) with character entity and file relations.
  version: 1.0.0
  contact:
    name: Dead Camera Studios
servers:
  - url: http://localhost:9099/api/v1
    description: Development
  - url: https://back.road2theoscars.tech/api/v1
    description: Production

paths:
  # ─── Auth ──────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, name, surname]
              properties:
                username:  { type: string, example: "user" }
                password:  { type: string, example: "pass123" }
                name:      { type: string, example: "John" }
                surname:   { type: string, example: "Doe" }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: "user" }
                password: { type: string, example: "pass123" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Images (legacy) ──────────────────────────────────────────
  /images/upload:
    post:
      tags: [Images]
      summary: Upload an image (multipart or base64 JSON)
      operationId: uploadImage
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                description: The image file when using multipart
          application/json:
            schema:
              type: object
              required: [filename, data]
              properties:
                filename: { type: string, example: "photo.png" }
                data:
                  type: string
                  description: Base64-encoded image (with or without data URI prefix)
                  example: "data:image/png;base64,iVBORw0KGgo..."
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageUploadResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /images/list:
    get:
      tags: [Images]
      summary: List all uploaded images
      operationId: listImages
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Image list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImageListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /images/{filename}:
    get:
      tags: [Images]
      summary: Serve original image file
      operationId: serveImage
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Raw image binary
          content:
            image/*: {}
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Images]
      summary: Delete an image (original + thumbnail)
      operationId: deleteImage
      security: [{ BearerAuth: [] }]
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /images/thumbnails/{filename}:
    get:
      tags: [Images]
      summary: Serve thumbnail image
      operationId: serveThumbnail
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Thumbnail binary
          content:
            image/*: {}
        "404":
          $ref: "#/components/responses/NotFound"

    # ─── Studio · Video ────────────────────────────────────────

  /studio/video/generate:
    post:
      tags: [Studio Video]
      summary: Generate video content
      operationId: studioVideoGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoGenerateRequest"
      responses:
        "201":
          description: Generation task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/VideoGenerateResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /studio/video/status/{taskId}:
    get:
      tags: [Studio Video]
      summary: Poll video generation task status
      operationId: studioVideoStatus
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/VideoStatusResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/video/task/{taskId}:
    delete:
      tags: [Studio Video]
      summary: Cancel a video generation task
      operationId: studioVideoCancelTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/video/preview:
    post:
      tags: [Studio Video]
      summary: Preview video API payload without sending it
      operationId: studioVideoPreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoGenerateRequest"
      responses:
        "200":
          description: AI payload preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      model:       { type: string }
                      endpoint:    { type: string }
                      payload:     { type: object }
                      content_type: { type: string }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Studio · Image ────────────────────────────────────────

  /studio/image/generate:
    post:
      tags: [Studio Image]
      summary: Generate image content
      operationId: studioImageGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerateRequest"
      responses:
        "201":
          description: Generation task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ImageGenerateResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /studio/image/status/{taskId}:
    get:
      tags: [Studio Image]
      summary: Poll image generation task status
      operationId: studioImageStatus
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ImageStatusResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/image/task/{taskId}:
    delete:
      tags: [Studio Image]
      summary: Cancel an image generation task
      operationId: studioImageCancelTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/image/preview:
    post:
      tags: [Studio Image]
      summary: Preview image API payload without sending it
      operationId: studioImagePreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerateRequest"
      responses:
        "200":
          description: AI payload preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      model:       { type: string }
                      endpoint:    { type: string }
                      payload:     { type: object }
                      content_type: { type: string }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Studio · Audio ────────────────────────────────────────

  /studio/audio/generate:
    post:
      tags: [Studio Audio]
      summary: Generate audio content
      operationId: studioAudioGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioGenerateRequest"
      responses:
        "201":
          description: Generation task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AudioGenerateResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /studio/audio/status/{taskId}:
    get:
      tags: [Studio Audio]
      summary: Poll audio generation task status
      operationId: studioAudioStatus
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AudioStatusResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/audio/task/{taskId}:
    delete:
      tags: [Studio Audio]
      summary: Cancel an audio generation task
      operationId: studioAudioCancelTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/audio/preview:
    post:
      tags: [Studio Audio]
      summary: Preview audio API payload without sending it
      operationId: studioAudioPreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioGenerateRequest"
      responses:
        "200":
          description: AI payload preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      model:       { type: string }
                      endpoint:    { type: string }
                      payload:     { type: object }
                      content_type: { type: string }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Studio · Text ─────────────────────────────────────────

  /studio/text/generate:
    post:
      tags: [Studio Text]
      summary: Generate text content
      operationId: studioTextGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextGenerateRequest"
      responses:
        "201":
          description: Generation task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TextGenerateResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /studio/text/status/{taskId}:
    get:
      tags: [Studio Text]
      summary: Poll text generation task status
      operationId: studioTextStatus
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TextStatusResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/text/task/{taskId}:
    delete:
      tags: [Studio Text]
      summary: Cancel a text generation task
      operationId: studioTextCancelTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/text/preview:
    post:
      tags: [Studio Text]
      summary: Preview text API payload without sending it
      operationId: studioTextPreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextGenerateRequest"
      responses:
        "200":
          description: AI payload preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      model:       { type: string }
                      endpoint:    { type: string }
                      payload:     { type: object }
                      content_type: { type: string }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Studio · Legacy ───────────────────────────────────────
# ─── Studio · Logs ──────────────────────────────────────────

  /studio/logs/generation:
    get:
      tags: [Studio Logs]
      summary: List generation logs (paginated, newest first)
      operationId: listGenerationLogs
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Paginated list of generation logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          $ref: "#/components/schemas/GenerationLog"
                      total:      { type: integer }
                      page:       { type: integer }
                      limit:      { type: integer }
                      total_pages: { type: integer }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/logs/generation/{id}:
    get:
      tags: [Studio Logs]
      summary: Get a single generation log by ID
      operationId: getGenerationLog
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Generation log details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GenerationLog"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── Files ────────────────────────────────────────────────────
  /files/upload:
    post:
      tags: [Files]
      summary: Upload a file (image, video, audio, temp)
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, category]
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                  enum: [images, videos, audio, temp]
                  description: Target directory category
                storage:
                  type: string
                  enum: [persistent, temp]
                  default: persistent
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /files:
    get:
      tags: [Files]
      summary: List files with optional filters
      operationId: listFiles
      parameters:
        - name: category
          in: query
          schema: { type: string, enum: [images, videos, audio, temp] }
        - name: storage
          in: query
          schema: { type: string, enum: [persistent, temp] }
        - name: trashed
          in: query
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"

  /files/trash:
    get:
      tags: [Files]
      summary: List trashed files
      operationId: listTrash
      responses:
        "200":
          description: Trash list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"

  /files/{id}:
    get:
      tags: [Files]
      summary: Get file metadata by ID
      operationId: getFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Files]
      summary: Soft delete (move file to trash)
      operationId: softDeleteFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}/serve:
    get:
      tags: [Files]
      summary: Serve raw file binary
      operationId: serveFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Raw file binary
          content:
            application/octet-stream: {}
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: File has been soft-deleted

  /files/{id}/thumbnail:
    get:
      tags: [Files]
      summary: Serve thumbnail (300×300, generated on-demand)
      operationId: serveFileThumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Thumbnail image binary
          content:
            image/*: {}
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: File has been soft-deleted
        "500":
          $ref: "#/components/responses/InternalError"

  /files/{id}/restore:
    post:
      tags: [Files]
      summary: Restore file from trash
      operationId: restoreFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}/recover-temp:
    post:
      tags: [Files]
      summary: Recover a temp file from trash back to temp/
      operationId: recoverTemp
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}/hard:
    delete:
      tags: [Files]
      summary: Permanently delete file (from disk and DB)
      operationId: hardDeleteFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── Characters ───────────────────────────────────────────────
  /characters:
    post:
      tags: [Characters]
      summary: Create a character
      operationId: createCharacter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Character created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Character" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Characters]
      summary: List all characters with their associated files
      operationId: listCharacters
      responses:
        "200":
          description: Character list with files
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CharacterWithFiles"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }

  /characters/{id}:
    get:
      tags: [Characters]
      summary: Get character with associated files
      operationId: getCharacter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Character details with enriched file metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/CharacterWithFiles" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Characters]
      summary: Update character fields
      operationId: updateCharacter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                description: { type: string }
                metadata:    { type: string, description: "JSON string for JSONB column" }
      responses:
        "200":
          description: Character updated
