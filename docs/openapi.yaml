openapi: "3.0.3"
info:
  title: DCS Back API
  description: |
    Backend for Dead Camera Studios. Three subsystems:
    
    **1. Images** — filesystem-based image upload/serve/delete (legacy).
    **2. Studio** — BytePlus ModelArk client (Seedance video, Seedream image, Assets API).
    **3. Files + Characters** — DB-backed file management (images, videos, audio) with character entity and file relations.
  version: 1.0.0
  contact:
    name: Dead Camera Studios
servers:
  - url: http://localhost:9099/api/v1
    description: Development
  - url: https://dcs-back.cloudtecnology.cloud/api/v1
    description: Production

paths:
  # ─── Auth ──────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, name, surname]
              properties:
                username:  { type: string, example: "user" }
                password:  { type: string, example: "pass123" }
                name:      { type: string, example: "John" }
                surname:   { type: string, example: "Doe" }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: "user" }
                password: { type: string, example: "pass123" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Images (legacy) ──────────────────────────────────────────
  /images/upload:
    post:
      tags: [Images]
      summary: Upload an image (multipart or base64 JSON)
      operationId: uploadImage
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                description: The image file when using multipart
          application/json:
            schema:
              type: object
              required: [filename, data]
              properties:
                filename: { type: string, example: "photo.png" }
                data:
                  type: string
                  description: Base64-encoded image (with or without data URI prefix)
                  example: "data:image/png;base64,iVBORw0KGgo..."
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageUploadResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /images/list:
    get:
      tags: [Images]
      summary: List all uploaded images
      operationId: listImages
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Image list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImageListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /images/{filename}:
    get:
      tags: [Images]
      summary: Serve original image file
      operationId: serveImage
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Raw image binary
          content:
            image/*: {}
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Images]
      summary: Delete an image (original + thumbnail)
      operationId: deleteImage
      security: [{ BearerAuth: [] }]
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /images/thumbnails/{filename}:
    get:
      tags: [Images]
      summary: Serve thumbnail image
      operationId: serveThumbnail
      parameters:
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Thumbnail binary
          content:
            image/*: {}
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Studio · Generate ────────────────────────────────────────

  /studio/generate:
    post:
      tags: [Studio Generate]
      summary: Generate content using a registered model (unified payload)
      operationId: studioGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioGenerateRequest"
      responses:
        "201":
          description: Generation task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StudioGenerateResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /studio/generate-legacy:
    post:
      tags: [Studio Generate]
      summary: Generate content using legacy Selection payload
      operationId: studioGenerateLegacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioSelection"
      responses:
        "201":
          description: Generation task created (legacy format)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      taskId:  { type: string, example: "byteplus-task-id" }
                      modelId: { type: string, format: uuid }
                      prompt:  { type: string }
                      model:   { type: string }
                      status:  { type: string }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /studio/status/{taskId}:
    get:
      tags: [Studio Generate]
      summary: Poll generation task status (returns outputs array)
      operationId: studioStatus
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StudioStatusResponse"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/status-legacy/{taskId}:
    get:
      tags: [Studio Generate]
      summary: Poll generation task status (legacy flat format)
      operationId: studioStatusLegacy
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status (legacy)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [running, succeeded, failed, succeeded_no_url, unknown]
                      videoUrl: { type: string, nullable: true }
                      localUrl: { type: string, nullable: true }
                      imageUrl: { type: string, nullable: true }
                      raw:      { type: object }
                      error:    { type: string }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/task/{taskId}:
    delete:
      tags: [Studio Generate]
      summary: Cancel a generation task
      operationId: studioCancelTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /studio/sync-asset:
    post:
      tags: [Studio Assets]
      summary: Sync a file to a model's asset library
      description: |
        Uploads a file to the BytePlus asset library (using the model's AK/SK),
        polls until Active, and stores the mapping for future generation.
        Subsequent generations with this file+model will use `asset://` URIs instead of data URLs.
      operationId: studioSyncAsset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model_id, file_id]
              properties:
                model_id: { type: string, format: uuid, description: "Model UUID (must have AK/SK and default_asset_group_id configured)" }
                file_id:  { type: string, format: uuid, description: "File UUID from /api/v1/files/upload" }
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:           { type: string, format: uuid }
                      model_id:     { type: string, format: uuid }
                      file_id:      { type: string, format: uuid }
                      asset_id:     { type: string, example: "asset-20260318-xxxxx" }
                      asset_group_id: { type: string, example: "group-20260318-xxxxx" }
                      status:       { type: string, enum: [active, syncing, failed] }
                      error_message: { type: string }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"

  /studio/sync-character-assets:
    post:
      tags: [Studio Assets]
      summary: Sync all files of a character to a model's asset library
      operationId: studioSyncCharacterAssets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [character_id, model_id]
              properties:
                character_id: { type: string, format: uuid }
                model_id:     { type: string, format: uuid }
      responses:
        "200":
          description: Sync result summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      model_id:  { type: string, format: uuid }
                      total:     { type: integer }
                      successful: { type: integer }
                      failed:    { type: integer }
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/SyncAssetResult"
                  success: { type: boolean }
                  message: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"

  /studio/files-with-sync:
    get:
      tags: [Studio Assets]
      summary: List files with synced model info
      operationId: studioListFilesWithSync
      parameters:
        - name: category
          in: query
          schema: { type: string, enum: [images, videos, audio, temp] }
        - name: storage
          in: query
          schema: { type: string, enum: [persistent, temp] }
        - name: trashed
          in: query
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: File list with synced_models per file
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileWithSync"
                  success: { type: boolean }
                  message: { type: string }

  /studio/characters/{id}/files-with-sync:
    get:
      tags: [Studio Assets]
      summary: List character files with synced model info
      operationId: studioListCharacterFilesWithSync
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Character files with synced_models
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CharacterFileWithSync"
                  success: { type: boolean }
                  message: { type: string }

  /studio/synced-assets:
    get:
      tags: [Studio Assets]
      summary: List all synced assets for a model
      operationId: studioListSyncedAssets
      parameters:
        - name: model_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Synced asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:            { type: string, format: uuid }
                        model_id:      { type: string, format: uuid }
                        file_id:       { type: string, format: uuid }
                        asset_id:      { type: string }
                        asset_group_id: { type: string }
                        status:        { type: string }
                        error_message: { type: string }
                        created_at:    { type: string, format: date-time }
                        updated_at:    { type: string, format: date-time }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"

  # ─── Files ────────────────────────────────────────────────────
  /files/upload:
    post:
      tags: [Files]
      summary: Upload a file (image, video, audio, temp)
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, category]
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                  enum: [images, videos, audio, temp]
                  description: Target directory category
                storage:
                  type: string
                  enum: [persistent, temp]
                  default: persistent
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /files:
    get:
      tags: [Files]
      summary: List files with optional filters
      operationId: listFiles
      parameters:
        - name: category
          in: query
          schema: { type: string, enum: [images, videos, audio, temp] }
        - name: storage
          in: query
          schema: { type: string, enum: [persistent, temp] }
        - name: trashed
          in: query
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"

  /files/trash:
    get:
      tags: [Files]
      summary: List trashed files
      operationId: listTrash
      responses:
        "200":
          description: Trash list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"

  /files/{id}:
    get:
      tags: [Files]
      summary: Get file metadata by ID
      operationId: getFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Files]
      summary: Soft delete (move file to trash)
      operationId: softDeleteFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}/serve:
    get:
      tags: [Files]
      summary: Serve raw file binary
      operationId: serveFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Raw file binary
          content:
            application/octet-stream: {}
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: File has been soft-deleted

  /files/{id}/thumbnail:
    get:
      tags: [Files]
      summary: Serve thumbnail (300×300, generated on-demand)
      operationId: serveFileThumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Thumbnail image binary
          content:
            image/*: {}
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: File has been soft-deleted
        "500":
          $ref: "#/components/responses/InternalError"

  /files/{id}/restore:
    post:
      tags: [Files]
      summary: Restore file from trash
      operationId: restoreFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}/recover-temp:
    post:
      tags: [Files]
      summary: Recover a temp file from trash back to temp/
      operationId: recoverTemp
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}/hard:
    delete:
      tags: [Files]
      summary: Permanently delete file (from disk and DB)
      operationId: hardDeleteFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── Characters ───────────────────────────────────────────────
  /characters:
    post:
      tags: [Characters]
      summary: Create a character
      operationId: createCharacter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Character created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Character" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Characters]
      summary: List all characters with their associated files
      operationId: listCharacters
      responses:
        "200":
          description: Character list with files
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CharacterWithFiles"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }

  /characters/{id}:
    get:
      tags: [Characters]
      summary: Get character with associated files
      operationId: getCharacter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Character details with enriched file metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/CharacterWithFiles" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Characters]
      summary: Update character fields
      operationId: updateCharacter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                description: { type: string }
                metadata:    { type: string, description: "JSON string for JSONB column" }
      responses:
        "200":
          description: Character updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Character" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Characters]
      summary: Soft delete a character
      operationId: deleteCharacter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{id}/files:
    post:
      tags: [Characters]
      summary: Link a file to a character
      operationId: addCharacterFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_id]
              properties:
                file_id: { type: string, format: uuid }
                role:
                  type: string
                  enum: [reference, portrait, asset]
                  default: reference
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Characters]
      summary: List files linked to a character (with metadata)
      operationId: listCharacterFiles
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Character files with enriched metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CharacterFile"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }

  /characters/{id}/files/{fileId}:
    delete:
      tags: [Characters]
      summary: Unlink a file from a character
      operationId: removeCharacterFile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: fileId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── Providers ─────────────────────────────────────────────
  /providers:
    post:
      tags: [Providers]
      summary: Create an AI provider
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderRequest"
      responses:
        "201":
          description: Provider created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Provider" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Providers]
      summary: List all providers with their models
      operationId: listProviders
      responses:
        "200":
          description: Provider list with models
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderWithModels"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }

  /providers/{id}:
    get:
      tags: [Providers]
      summary: Get provider with its models
      operationId: getProvider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Provider details with models
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/ProviderWithModels" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Providers]
      summary: Update provider fields
      operationId: updateProvider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:   { type: string }
                active: { type: boolean }
      responses:
        "200":
          description: Provider updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Provider" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Providers]
      summary: Soft delete a provider
      operationId: deleteProvider
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "404":
          $ref: "#/components/responses/NotFound"

  /providers/{id}/models:
    get:
      tags: [Providers]
      summary: List models for a provider
      operationId: listProviderModels
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Model list for provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Model"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Models ────────────────────────────────────────────────
  /models:
    post:
      tags: [Models]
      summary: Create a model under a provider
      operationId: createModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelRequest"
      responses:
        "201":
          description: Model created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Model" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "created" }
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [Models]
      summary: List all models across providers
      operationId: listModels
      responses:
        "200":
          description: Model list with provider names
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ModelWithProvider"
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }

  /models/{id}:
    get:
      tags: [Models]
      summary: Get model by ID
      operationId: getModel
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Model details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Model" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Models]
      summary: Update model fields
      operationId: updateModel
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:     { type: string }
                api_key:  { type: string }
                url:      { type: string }
                endpoint: { type: string }
                active:   { type: boolean }
      responses:
        "200":
          description: Model updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Model" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Models]
      summary: Soft delete a model
      operationId: deleteModel
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/MessageOK"
        "404":
          $ref: "#/components/responses/NotFound"

  /models/favorite:
    get:
      tags: [Models]
      summary: Get the favorite model, if any
      operationId: getFavoriteModel
      responses:
        "200":
          description: Favorite model or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/Model"
                      - { type: "null" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }

  /models/{id}/favorite:
    post:
      tags: [Models]
      summary: Set model as favorite (unmarks any previous favorite)
      operationId: setFavoriteModel
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Model marked as favorite
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:    { $ref: "#/components/schemas/Model" }
                  success: { type: boolean, example: true }
                  message: { type: string, example: "success" }
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/login

  schemas:
    # ─── Auth ─────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:         { type: integer }
        username:   { type: string }
        name:       { type: string }
        surname:    { type: string }
        active:     { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ─── Providers & Models ──────────────────────────────────
    Provider:
      type: object
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        active:     { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    Model:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        provider_id:          { type: string, format: uuid }
        name:                 { type: string }
        api_key:              { type: string }
        url:                  { type: string }
        endpoint:             { type: string }
        access_key_id:        { type: string, description: "AK for BytePlus asset library API" }
        secret_access_key:    { type: string, description: "SK for BytePlus asset library API" }
        default_asset_group_id: { type: string, description: "Default asset group ID for asset sync" }
        active:               { type: boolean }
        favorite:             { type: boolean }
        created_at:           { type: string, format: date-time }
        updated_at:           { type: string, format: date-time }
        deleted_at:           { type: string, format: date-time, nullable: true }

    ModelWithProvider:
      allOf:
        - $ref: "#/components/schemas/Model"
        - type: object
          properties:
            provider_name: { type: string }

    ProviderWithModels:
      type: object
      properties:
        provider: { $ref: "#/components/schemas/Provider" }
        models:
          type: array
          items:
            $ref: "#/components/schemas/Model"

    CreateProviderRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    CreateModelRequest:
      type: object
      required: [provider_id, name, api_key, url, endpoint]
      properties:
        provider_id:          { type: string, format: uuid }
        name:                 { type: string }
        api_key:              { type: string }
        url:                  { type: string }
        endpoint:             { type: string }
        access_key_id:        { type: string }
        secret_access_key:    { type: string }
        default_asset_group_id: { type: string }
        active:               { type: boolean, default: true }

    # ─── Images (legacy) ──────────────────────────────────────
    ImageUploadResult:
      type: object
      properties:
        filename:      { type: string }
        url:           { type: string, format: uri }
        thumbnail_url: { type: string, format: uri }
        size:          { type: integer }

    ImageListItem:
      type: object
      properties:
        filename:      { type: string }
        url:           { type: string }
        thumbnail_url: { type: string }

    # ─── Studio ─────────────────────────────────────────────

    # New unified payload types

    StudioContentItem:
      type: object
      required: [type]
      description: "Item in the content array — text prompt or file reference"
      properties:
        type:
          type: string
          enum: [text, image, video, audio]
          description: "text para prompt, image/video/audio para archivos de referencia"
        text:
          type: string
          description: "Prompt textual o descripción del asset de referencia"
        name:
          type: string
          description: "Nombre original del archivo (solo image/video/audio)"
        id:
          type: string
          format: uuid
          description: "UUID del archivo en file store (solo image/video/audio)"

    StudioGenerateRequest:
      type: object
      required: [model, content]
      properties:
        model:
          type: string
          example: "dreamina-seedance-2-0-260128"
          description: "Nombre del modelo registrado en el provider store"
        content:
          type: array
          items:
            $ref: "#/components/schemas/StudioContentItem"
          description: "Array de prompts de texto y/o referencias a archivos"
        ratio:
          type: string
          example: "16:9"
          description: "Relación de aspecto"
        duration:
          type: number
          default: 5
          description: "Duración en segundos (modelos de video)"
        camerafixed:
          type: boolean
          default: false
          description: "Cámara fija sin movimiento"
        seed:
          type: string
          example: "22"
          description: "Semilla para reproducibilidad"
        quality:
          type: string
          enum: [standard, high]
          default: standard
        quantity:
          type: integer
          default: 1
          description: "Cantidad de outputs a generar"
        watermark:
          type: boolean
          default: false
        resolution:
          type: string
          example: "480p"
          description: "Resolución: 480p, 720p, 1080p, etc."
        generate_audio:
          type: boolean
          description: "Generar audio para el video"
        image_mode:
          type: string
          example: "PIL"
          description: "Modo de procesamiento de imagen"

    OutputResource:
      type: object
      description: "Recurso generado (video, imagen o audio)"
      properties:
        url:
          type: string
          format: uri
          description: "URL pública del recurso generado"
        localUrl:
          type: string
          nullable: true
          description: "URL local del recurso descargado (cuando aplica)"
        type:
          type: string
          enum: [video, image, audio]
          description: "Tipo de recurso"

    StudioGenerateResponse:
      type: object
      description: "Respuesta de POST /studio/generate"
      properties:
        taskId:
          type: string
          example: "cgt-20260515-abc123"
        model:
          type: string
          example: "dreamina-seedance-2-0-260128"
        status:
          type: string
          enum: [running, succeeded, failed, queued]
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/OutputResource"
          description: "Outputs generados (vacío si la tarea está en progreso). Siempre es un array."

    StudioStatusResponse:
      type: object
      description: "Respuesta de GET /studio/status/{taskId}"
      properties:
        status:
          type: string
          enum: [running, succeeded, failed, succeeded_no_url, queued]
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/OutputResource"
          description: "Outputs generados. Siempre es un array."
        error:
          type: string
          description: "Mensaje de error si la tarea falló"

    # Legacy types

    StudioSelection:
      type: object
      required: [model_id]
      properties:
        model_id:     { type: string, format: uuid, description: "ID of the registered model" }
        userPrompt:   { type: string }
        duration:     { type: number, default: 5 }
        soundOn:      { type: boolean }
        aspectRatio:  { type: object, properties: { value: { type: string } } }
        resolution:   { type: object, properties: { value: { type: string } } }
        cameraMotion: { type: object, properties: { id: { type: string }, prompt: { type: string } } }
        camera:       { type: object, properties: { id: { type: string }, prompt: { type: string } } }
        lens:         { type: object, properties: { id: { type: string }, prompt: { type: string } } }
        colorGrading: { type: object, properties: { id: { type: string }, prompt: { type: string } } }
        genre:        { type: object, properties: { id: { type: string }, prompt: { type: string } } }
        firstFrame:   { type: object, properties: { dataUrl: { type: string } } }
        lastFrame:    { type: object, properties: { dataUrl: { type: string } } }
        refImages:    { type: array, items: { type: object, properties: { dataUrl: { type: string } } } }
        refVideos:    { type: array, items: { type: object, properties: { dataUrl: { type: string } } } }
        refAudios:    { type: array, items: { type: object, properties: { dataUrl: { type: string } } } }

    # ─── Studio enriched file listing ─────────────────────────
    FileWithSync:
      type: object
      properties:
        id:            { type: string, format: uuid }
        filename:      { type: string }
        path:          { type: string }
        size:          { type: integer }
        mime_type:     { type: string }
        category:      { type: string }
        format:        { type: string }
        storage:       { type: string }
        trashed:       { type: boolean }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }
        deleted_at:    { type: string, format: date-time, nullable: true }
        synced_models:
          type: array
          items:
            $ref: "#/components/schemas/ModelBrief"
          description: "Modelos con los que este archivo está sincronizado"

    CharacterFileWithSync:
      type: object
      properties:
        file_id:       { type: string, format: uuid }
        role:          { type: string }
        filename:      { type: string }
        url:           { type: string, format: uri }
        thumbnail_url: { type: string, format: uri }
        mime_type:     { type: string }
        category:      { type: string }
        format:        { type: string }
        size:          { type: integer }
        created_at:    { type: string, format: date-time }
        synced_models:
          type: array
          items:
            $ref: "#/components/schemas/ModelBrief"

    ModelBrief:
      type: object
      properties:
        model_id: { type: string, format: uuid }
        name:     { type: string, example: "dreamina-seedance-2-0-fast-260128" }

    SyncAssetResult:
      type: object
      properties:
        id:            { type: string, format: uuid }
        model_id:      { type: string, format: uuid }
        file_id:       { type: string, format: uuid }
        asset_id:      { type: string, example: "asset-20260318-xxxxx" }
        asset_group_id: { type: string }
        status:        { type: string, enum: [active, syncing, failed] }
        error_message: { type: string }

    # ─── Files ────────────────────────────────────────────────
    File:
      type: object
      properties:
        id:         { type: string, format: uuid }
        filename:   { type: string }
        path:       { type: string }
        size:       { type: integer }
        mime_type:  { type: string, example: "image/png" }
        category:   { type: string, enum: [images, videos, audio, temp] }
        format:     { type: string, example: "png" }
        storage:    { type: string, enum: [persistent, temp] }
        trashed:    { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    FileUploadResult:
      type: object
      properties:
        id:        { type: string, format: uuid }
        filename:  { type: string }
        url:       { type: string, format: uri }
        size:      { type: integer }
        mime_type: { type: string }
        format:    { type: string }
        category:  { type: string }

    CharacterFile:
      type: object
      properties:
        file_id:    { type: string, format: uuid }
        role:       { type: string, example: "reference" }
        filename:   { type: string }
        url:           { type: string, format: uri, example: "http://localhost:9099/api/v1/files/uuid/serve" }
        thumbnail_url: { type: string, format: uri, example: "http://localhost:9099/api/v1/files/uuid/thumbnail" }
        mime_type:     { type: string, example: "image/png" }
        category:      { type: string, example: "images" }
        format:        { type: string, example: "png" }
        size:          { type: integer, example: 12345 }
        created_at:    { type: string, format: date-time }
        synced_models:
          type: array
          items:
            $ref: "#/components/schemas/ModelBrief"
          description: "Modelos con los que este archivo está sincronizado (visible en GET /characters)"

    CharacterWithFiles:
      type: object
      properties:
        character: { $ref: "#/components/schemas/Character" }
        files:
          type: array
          items:
            $ref: "#/components/schemas/CharacterFile"

    # ─── Characters ───────────────────────────────────────────
    Character:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        description: { type: string }
        metadata:    { type: string, description: "JSON string stored in JSONB column" }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        deleted_at:  { type: string, format: date-time, nullable: true }

    CreateCharacterRequest:
      type: object
      required: [name]
      properties:
        name:        { type: string }
        description: { type: string, default: "" }
        metadata:    { type: string, description: "JSON string for JSONB" }

    # ─── Standard API Response wrapper ────────────────────────
    ApiResponse:
      type: object
      properties:
        data: {}
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "success"
    ApiErrorResponse:
      type: object
      properties:
        data: { nullable: true, example: null }
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "error description"

  responses:
    BadRequest:
      description: Bad request — missing or invalid fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Unauthorized — invalid or missing JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    MessageOK:
      description: Success
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"

tags:
  - name: Auth
    description: User registration and JWT login
  - name: Images
    description: Legacy filesystem-based image management (requires JWT)
  - name: Studio Generate
    description: Model-driven content generation (video, image)
  - name: Files
    description: DB-backed file management (images, videos, audio, temp)
  - name: Characters
    description: Character entity management with file associations
  - name: Providers
    description: AI provider management
  - name: Models
    description: AI model registration and configuration
  - name: Studio Assets
    description: Asset library sync — upload files to BytePlus asset library for optimized generation
