components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/login

  schemas:
    # ─── Auth ─────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:         { type: integer }
        username:   { type: string }
        name:       { type: string }
        surname:    { type: string }
        active:     { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ─── Providers & Models ──────────────────────────────────
    Provider:
      type: object
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        active:     { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    Model:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        provider_id:          { type: string, format: uuid }
        name:                 { type: string }
        api_key:              { type: string }
        url:                  { type: string }
        endpoint:             { type: string }
        access_key_id:        { type: string, description: "AK for BytePlus asset library API" }
        secret_access_key:    { type: string, description: "SK for BytePlus asset library API" }
        default_asset_group_id: { type: string, description: "Default asset group ID for asset sync" }
        active:               { type: boolean }
        favorite:             { type: boolean }
        created_at:           { type: string, format: date-time }
        updated_at:           { type: string, format: date-time }
        deleted_at:           { type: string, format: date-time, nullable: true }

    ModelWithProvider:
      allOf:
        - $ref: "#/components/schemas/Model"
        - type: object
          properties:
            provider_name: { type: string }

    ProviderWithModels:
      type: object
      properties:
        provider: { $ref: "#/components/schemas/Provider" }
        models:
          type: array
          items:
            $ref: "#/components/schemas/Model"

    CreateProviderRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    CreateModelRequest:
      type: object
      required: [provider_id, name, api_key, url, endpoint]
      properties:
        provider_id:          { type: string, format: uuid }
        name:                 { type: string }
        api_key:              { type: string }
        url:                  { type: string }
        endpoint:             { type: string }
        access_key_id:        { type: string }
        secret_access_key:    { type: string }
        default_asset_group_id: { type: string }
        active:               { type: boolean, default: true }

    # ─── Images (legacy) ──────────────────────────────────────
    ImageUploadResult:
      type: object
      properties:
        filename:      { type: string }
        url:           { type: string, format: uri }
        thumbnail_url: { type: string, format: uri }
        size:          { type: integer }

    ImageListItem:
      type: object
      properties:
        filename:      { type: string }
        url:           { type: string }
        thumbnail_url: { type: string }

    # ─── Studio · Video ──────────────────────────────────

    VideoContentItem:
      type: object
      required: [type]
      description: "Item in the video content array"
      properties:
        type:
          type: string
          enum: [text, image, video, audio]
        text:  { type: string, description: "Prompt textual o descripción" }
        name:  { type: string, description: "Nombre original del archivo" }
        id:    { type: string, format: uuid, description: "UUID del archivo" }

    VideoGenerateRequest:
      type: object
      required: [model, content]
      properties:
        model:    { type: string, example: "dreamina-seedance-2-0-260128" }
        content:
          type: array
          items:
            $ref: "#/components/schemas/VideoContentItem"
        ratio:         { type: string, example: "16:9" }
        duration:      { type: number, default: 5 }
        camerafixed:   { type: boolean, default: false }
        seed:          { type: string }
        quality:       { type: string, enum: [standard, high], default: standard }
        quantity:      { type: integer, default: 1 }
        watermark:     { type: boolean, default: false }
        resolution:    { type: string, example: "480p" }
        generate_audio: { type: boolean }

    VideoOutputResource:
      type: object
      properties:
        url:      { type: string, format: uri }
        localUrl: { type: string, nullable: true }

    VideoGenerateResponse:
      type: object
      properties:
        taskId:  { type: string, example: "cgt-20260515-abc123" }
        model:   { type: string }
        status:  { type: string, enum: [running, succeeded, failed, queued] }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/VideoOutputResource"

    VideoStatusResponse:
      type: object
      properties:
        status:  { type: string, enum: [running, succeeded, failed, succeeded_no_url, queued] }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/VideoOutputResource"
        error: { type: string }

    # ─── Studio · Image ──────────────────────────────────

    ImageContentItem:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [text, image, video] }
        text: { type: string }
        name: { type: string }
        id:   { type: string, format: uuid }

    ImageGenerateRequest:
      type: object
      required: [model, content]
      properties:
        model:    { type: string, example: "dreamina-seedream-4-pro-251224" }
        content:
          type: array
          items:
            $ref: "#/components/schemas/ImageContentItem"
        ratio:    { type: string }
        seed:     { type: string }
        quality:  { type: string, enum: [standard, high], default: standard }
        quantity: { type: integer, default: 1 }
        watermark: { type: boolean, default: false }

    ImageOutputResource:
      type: object
      properties:
        url: { type: string, format: uri }

    ImageGenerateResponse:
      type: object
      properties:
        taskId:  { type: string }
        model:   { type: string }
        status:  { type: string, enum: [succeeded, failed] }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/ImageOutputResource"

    ImageStatusResponse:
      type: object
      properties:
        status:  { type: string }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/ImageOutputResource"
        error: { type: string }

    # ─── Studio · Audio ──────────────────────────────────

    AudioContentItem:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [text, audio] }
        text: { type: string }
        name: { type: string }
        id:   { type: string, format: uuid }

    AudioGenerateRequest:
      type: object
      required: [model, content]
      properties:
        model:    { type: string }
        content:
          type: array
          items:
            $ref: "#/components/schemas/AudioContentItem"
        duration: { type: number }
        seed:     { type: string }
        quality:  { type: string }

    AudioOutputResource:
      type: object
      properties:
        url:      { type: string, format: uri }
        localUrl: { type: string, nullable: true }

    AudioGenerateResponse:
      type: object
      properties:
        taskId:  { type: string }
        model:   { type: string }
        status:  { type: string }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/AudioOutputResource"

    AudioStatusResponse:
      type: object
      properties:
        status:  { type: string }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/AudioOutputResource"
        error: { type: string }

    # ─── Studio · Text ──────────────────────────────────

    TextContentItem:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [text] }
        text: { type: string }
        name: { type: string }
        id:   { type: string, format: uuid }

    TextGenerateRequest:
      type: object
      required: [model, content]
      properties:
        model:    { type: string }
        content:
          type: array
          items:
            $ref: "#/components/schemas/TextContentItem"
        seed:     { type: string }
        quality:  { type: string }
        quantity: { type: integer, default: 1 }

    TextOutputResource:
      type: object
      properties:
        text: { type: string }

    TextGenerateResponse:
      type: object
      properties:
        taskId:  { type: string }
        model:   { type: string }
        status:  { type: string }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/TextOutputResource"

    TextStatusResponse:
      type: object
      properties:
        status:  { type: string }
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/TextOutputResource"
        error: { type: string }

    # ─── Studio enriched file listing ─────────────────────────
    # ─── Studio enriched file listing ─────────────────────────
    FileWithSync:
      type: object
      properties:
        id:            { type: string, format: uuid }
        filename:      { type: string }
        path:          { type: string }
        size:          { type: integer }
        mime_type:     { type: string }
        category:      { type: string }
        format:        { type: string }
        storage:       { type: string }
        trashed:       { type: boolean }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }
        deleted_at:    { type: string, format: date-time, nullable: true }
        synced_models:
          type: array
          items:
            $ref: "#/components/schemas/ModelBrief"
          description: "Modelos con los que este archivo está sincronizado"

    CharacterFileWithSync:
      type: object
      properties:
        file_id:       { type: string, format: uuid }
        role:          { type: string }
        filename:      { type: string }
        url:           { type: string, format: uri }
        thumbnail_url: { type: string, format: uri }
        mime_type:     { type: string }
        category:      { type: string }
        format:        { type: string }
        size:          { type: integer }
        created_at:    { type: string, format: date-time }
        synced_models:
          type: array
          items:
            $ref: "#/components/schemas/ModelBrief"

    ModelBrief:
      type: object
      properties:
        model_id: { type: string, format: uuid }
        name:     { type: string, example: "dreamina-seedance-2-0-fast-260128" }

    GenerationLog:
      type: object
      properties:
        id:            { type: string, format: uuid }
        task_id:       { type: string, description: "ID de la tarea de generacion" }
        model_name:    { type: string, description: "Nombre del modelo usado" }
        request:       { type: string, description: "Payload original enviado al endpoint (JSON)" }
        ai_response:   { type: string, description: "Respuesta cruda de la API de IA (JSON)" }
        ai_call_payload: { type: string, description: "Payload enviado a la API de IA (JSON)" }
        outputs:       { type: string, description: "Outputs generados (JSON)" }
        status:        { type: string, enum: [running, succeeded, failed] }
        error_message: { type: string }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }
        deleted_at:    { type: string, format: date-time, nullable: true }

    SyncAssetResult:
      type: object
      properties:
        id:            { type: string, format: uuid }
        model_id:      { type: string, format: uuid }
        file_id:       { type: string, format: uuid }
        asset_id:      { type: string, example: "asset-20260318-xxxxx" }
        asset_group_id: { type: string }
        status:        { type: string, enum: [active, syncing, failed] }
        error_message: { type: string }

    # ─── Files ────────────────────────────────────────────────
    File:
      type: object
      properties:
        id:         { type: string, format: uuid }
        filename:   { type: string }
        path:       { type: string }
        size:       { type: integer }
        mime_type:  { type: string, example: "image/png" }
        category:   { type: string, enum: [images, videos, audio, temp] }
        format:     { type: string, example: "png" }
        storage:    { type: string, enum: [persistent, temp] }
        trashed:    { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }

    FileUploadResult:
      type: object
      properties:
        id:        { type: string, format: uuid }
        filename:  { type: string }
        url:       { type: string, format: uri }
        size:      { type: integer }
        mime_type: { type: string }
        format:    { type: string }
        category:  { type: string }

    CharacterFile:
      type: object
      properties:
        file_id:    { type: string, format: uuid }
        role:       { type: string, example: "reference" }
        filename:   { type: string }
        url:           { type: string, format: uri, example: "http://localhost:9099/api/v1/files/uuid/serve" }
        thumbnail_url: { type: string, format: uri, example: "http://localhost:9099/api/v1/files/uuid/thumbnail" }
        mime_type:     { type: string, example: "image/png" }
        category:      { type: string, example: "images" }
        format:        { type: string, example: "png" }
        size:          { type: integer, example: 12345 }
        created_at:    { type: string, format: date-time }
        synced_models:
          type: array
          items:
            $ref: "#/components/schemas/ModelBrief"
          description: "Modelos con los que este archivo está sincronizado (visible en GET /characters)"

    CharacterWithFiles:
      type: object
      properties:
        character: { $ref: "#/components/schemas/Character" }
        files:
          type: array
          items:
            $ref: "#/components/schemas/CharacterFile"

    # ─── Characters ───────────────────────────────────────────
    Character:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        description: { type: string }
        metadata:    { type: string, description: "JSON string stored in JSONB column" }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        deleted_at:  { type: string, format: date-time, nullable: true }

    CreateCharacterRequest:
      type: object
      required: [name]
      properties:
        name:        { type: string }
        description: { type: string, default: "" }
        metadata:    { type: string, description: "JSON string for JSONB" }

    # ─── Standard API Response wrapper ────────────────────────
    ApiResponse:
      type: object
      properties:
        data: {}
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "success"
    ApiErrorResponse:
      type: object
      properties:
        data: { nullable: true, example: null }
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "error description"

    # --- Projects -------------------------------------------------
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:        { type: string }
        description: { type: string }
        metadata:    { type: string, description: "JSON string" }

    UpdateProjectRequest:
      type: object
      properties:
        name:        { type: string }
        description: { type: string }
        metadata:    { type: string }

    Project:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        description: { type: string }
        metadata:    { type: string }
        active:      { type: boolean, default: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        deleted_at:  { type: string, format: date-time, nullable: true }

    ProjectWithScenes:
      type: object
      properties:
        project: { $ref: "#/components/schemas/Project" }
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/Scene"

    CreateSceneRequest:
      type: object
      required: [number]
      properties:
        number:      { type: integer }
        name:        { type: string }
        description: { type: string }

    UpdateSceneRequest:
      type: object
      properties:
        number:      { type: integer }
        name:        { type: string }
        description: { type: string }

    Scene:
      type: object
      properties:
        id:          { type: string, format: uuid }
        project_id:  { type: string, format: uuid }
        number:      { type: integer }
        name:        { type: string }
        description: { type: string }
        active:      { type: boolean, default: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        deleted_at:  { type: string, format: date-time, nullable: true }

    SceneWithTakes:
      type: object
      properties:
        scene: { $ref: "#/components/schemas/Scene" }
        takes:
          type: array
          items:
            $ref: "#/components/schemas/Take"

    CreateTakeRequest:
      type: object
      required: [number]
      properties:
        number: { type: integer, minimum: 1, maximum: 100 }
        status: { type: string, default: "pending" }

    UpdateTakeRequest:
      type: object
      properties:
        video_url:       { type: string }
        video_local_url: { type: string }
        status:          { type: string }

    Take:
      type: object
      properties:
        id:              { type: string, format: uuid }
        scene_id:        { type: string, format: uuid }
        number:          { type: integer }
        video_url:       { type: string }
        video_local_url: { type: string }
        status:          { type: string, enum: [pending, processing, completed, failed] }
        active:          { type: boolean, default: true }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }
        deleted_at:      { type: string, format: date-time, nullable: true }


  responses:
    BadRequest:
      description: Bad request — missing or invalid fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Unauthorized — invalid or missing JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    MessageOK:
      description: Success
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"

tags:
  - name: Auth
    description: User registration and JWT login
  - name: Images
    description: Legacy filesystem-based image management (requires JWT)
  - name: Studio Video
    description: Video generation endpoints (Seedance models)
  - name: Studio Image
    description: Image generation endpoints (Seedream models)
  - name: Studio Audio
    description: Audio generation endpoints
  - name: Studio Text
    description: Text generation endpoints
    description: Model-driven content generation (video, image)
  - name: Files
    description: DB-backed file management (images, videos, audio, temp)
  - name: Characters
    description: Character entity management with file associations
  - name: Providers
    description: AI provider management
  - name: Models
    description: AI model registration and configuration
  - name: Studio Assets
    description: Asset library sync — upload files to BytePlus asset library for optimized generation
  - name: Studio Logs
    description: Generation task logs — payload and AI response history
  - name: Projects
    description: Project, scene, and take management for video production
