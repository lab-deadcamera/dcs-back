version: "3.8"

services:
  app:
    build: .
    container_name: dcs-back
    ports:
      - "${PORT:-9099}:9099"
    environment:
      - PORT=${PORT}
      - UPLOAD_DIR=${UPLOAD_DIR}
      - URL_PUBLIC=${URL_PUBLIC}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads

  postgres:
    image: postgres:15-alpine
    container_name: dcs-postgres
    environment:
      - POSTGRES_USER=dcs
      - POSTGRES_PASSWORD=dcs_pass
      - POSTGRES_DB=dcs_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  uploads:
  pgdata:
